<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>INSERTION Sort | AlgoVision AI</title>
    <link rel="stylesheet" href="style.css">
</head>

<body data-algo="insertion">

<!-- TOP BAR -->
<div class="top-bar">
    <button class="back-btn" onclick="window.location.href='index.html'">← Home</button>
    <h2>INSERTION SORT</h2>
</div>

<!-- MAIN WORKSPACE -->
<div class="workspace">

    <!-- LEFT PANEL -->
    <div class="left-panel">

        <!-- INPUT -->
        <div class="input-section">
            <input id="arrayInput" type="text" placeholder="Enter numbers (e.g. 12,4,5,11)">
        </div>
<!-- Search Input (for searching algos) -->
<input
    id="searchInput"
    type="number"
    placeholder="Enter target value"
    style="display:none;"
>
        <!-- VISUALIZATION -->
        <div id="bars" class="bars-container"></div>

        <!-- CONTROLS -->
      <div class="controls">

<button onclick="setActiveButton(this); start()">Start</button>
<button onclick="resume()">Resume</button>
<button onclick="setActiveButton(this); pause()">Pause</button>

<button onclick="setActiveButton(this); prevStep()">Prev</button>

<button onclick="setActiveButton(this); nextStep()">Next</button>

<button onclick="setActiveButton(this); stop()">Stop</button>

<button id="voiceBtn" onclick="toggleVoice()">🔊 Voice ON</button>

</div>
        <!-- SPEED -->
        <div class="speed-control">
            Speed: <span id="speedValue">50%</span>
            <input id="speed" type="range" min="10" max="100" step="10" value="50">
        </div>

    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">

        <!-- DEFINITION -->
        <div id="definitionBox" class="definition-box"></div>

        <!-- EXPLANATION -->
        <div id="message" class="explain">
            Press Start to begin.
        </div>

        <hr>

        <!-- CODE -->
        <div id="codeBox" class="pseudoBox"></div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
